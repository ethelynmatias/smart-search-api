services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${DOCKER_UID}
        GID: ${DOCKER_GID}
    container_name: smart-search-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smart-search

  nginx:
    image: nginx:alpine
    container_name: smart-search-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - smart-search

  mysql:
    image: mysql:8.4
    container_name: smart-search-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      # -h 127.0.0.1 forces TCP so the check doesn't pass on the init-time socket-only server
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - smart-search

  redis:
    image: redis:alpine
    container_name: smart-search-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - smart-search

networks:
  smart-search:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
